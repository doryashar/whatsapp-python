services:
  whatsapp-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - whatsapp-data:/app/data
      - ./src:/app/src:ro
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DEBUG=false
      - AUTO_LOGIN=false
      - DATABASE_URL=postgres://postgres:b7854fa932f60c54@wa-postgres.cap.yashar.us:5432/postgres
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=whatsapp-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - otel-collector
    networks:
      - whatsapp-net

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - whatsapp-net

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - whatsapp-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otel-collector
    volumes:
      - ./monitoring/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    command: --config=/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - loki
    networks:
      - whatsapp-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=J5WWw%nWcz]7*$,
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    networks:
      - whatsapp-net

  webhook-listener:
    image: python:3.12-slim
    container_name: webhook-listener
    ports:
      - "5555:5555"
    volumes:
      - ./scripts:/scripts:ro
    command: python3 -u /scripts/webhook_listener.py --api-key "wa_rRRTpFyByW_ktn6MP55_PHh17YkirrlqZATbDzRmaMs" --api-url "http://whatsapp-api:8080" --external-url "http://webhook-listener:5555/webhook" --host "0.0.0.0"
    depends_on:
      - whatsapp-api
    networks:
      - whatsapp-net

volumes:
  whatsapp-data:
  loki-data:
  grafana-data:

networks:
  whatsapp-net:
