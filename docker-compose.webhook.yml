version: '3.8'

services:
  whatsapp-api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - whatsapp-data:/app/data
    environment:
      - ADMIN_API_KEY=${ADMIN_API_KEY:-admin_secret_key}
      - DATABASE_URL=${DATABASE_URL:-}
      - DEBUG=${DEBUG:-false}
    networks:
      - whatsapp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

